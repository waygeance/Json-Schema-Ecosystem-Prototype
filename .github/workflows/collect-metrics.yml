name: Collect Ecosystem Metrics

on:
  schedule:
    # Run every hour at minute 0 (hourly collection)
    - cron: "0 * * * *"

  # Allow manual trigger
  workflow_dispatch:

env:
  # Opt into Node.js 24 for GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Collecting ecosystem metrics..."
          npx tsx scripts/collect-metrics.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Update ecosystem metrics - $(date -u +%Y-%m-%d)"
          git push
